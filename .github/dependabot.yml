version: 2
updates:
  # Dependency-freshness reporting, per the ops-agent design: a bespoke LLM
  # agent has no safety net without CI/staging, so this uses GitHub's own
  # free, reliable dependency-update bot instead (Batch D).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    # Majors need a human: TS 7 / ESLint 10-style bumps break the Next.js
    # toolchain and there is no CI to catch it before the Vercel build fails.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
